<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090B" />
  <title>MovieMint — Book Movie Tickets</title>
  <meta name="description"
    content="MovieMint — book movie tickets fast. Browse now showing & upcoming films, pick your seats in 3D, and pay securely." />

  <!-- Open Graph (WhatsApp / Facebook / LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MovieMint" />
  <meta property="og:title" content="MovieMint — Book Movie Tickets" />
  <meta property="og:description"
    content="Browse now showing & upcoming films, pick your seats in 3D, and pay securely." />
  <meta property="og:image" content="/favicon.svg" />
  <meta property="og:url" content="https://moviemint-client.vercel.app/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MovieMint — Book Movie Tickets" />
  <meta name="twitter:description"
    content="Browse now showing & upcoming films, pick your seats in 3D, and pay securely." />
  <meta name="twitter:image" content="/favicon.svg" />
  <script>
    // App is dark-only: always apply the dark theme before first paint.
    (function () {
      try {
        localStorage.setItem('theme', 'dark');
      } catch (e) { /* ignore */ }
      document.documentElement.classList.remove('light');
      document.documentElement.classList.add('dark');
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
